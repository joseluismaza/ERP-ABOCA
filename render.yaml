services:
  - type: web
    name: erp-aboca
    env: node
    region: frankfurt
    buildCommand: npm install --prefix backend --ignore-scripts && npm --prefix frontend install --include=dev && npm --prefix frontend run build
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HUSKY
        value: "0"
      # Las siguientes variables se configuran manualmente en el dashboard de Render:
      # JWT_SECRET, PDF_OWNER_KEY, SMTP_HOST, SMTP_USER, SMTP_PASS, SMTP_PORT,
      # SMTP_LAST_UPDATE, MONGODB_URI, ENCRYPTION_KEY, CRON_SECRET
