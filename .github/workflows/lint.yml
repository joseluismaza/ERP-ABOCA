name: ESLint Backend

# Se ejecuta en cada push y en cada Pull Request hacia main o develop.
# Un PR con errores de ESLint no puede mergearse hasta que estén corregidos.
on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'          # Solo se activa si hay cambios en el backend
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  lint:
    name: Lint Backend
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar la versión de Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # 3. Instalar dependencias del backend (incluye eslint en devDependencies)
      - name: Instalar dependencias
        run: npm ci
        working-directory: backend

      # 4. Ejecutar ESLint — si falla, el job falla y bloquea el merge
      - name: Ejecutar ESLint
        run: npm run lint
        working-directory: backend